<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración de Usuarios</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    padding:25px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h2{
    color:#1e293b;
}

.actions{
    display:flex;
    gap:10px;
}

input, select{
    padding:10px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    width:100%;
}

.btn{
    background:#1e293b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#0f172a;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e293b;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
}

.role{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.admin{
    background:#dc2626;
    color:white;
}

.usuario{
    background:#2563eb;
    color:white;
}

.small-btn{
    border:none;
    color:white;
    padding:7px 12px;
    border-radius:5px;
    cursor:pointer;
}

.edit{
    background:#2563eb;
}

.delete{
    background:#dc2626;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.modal-content{
    background:white;
    width:400px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
}

.modal-content h3{
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <h2>Administración de Usuarios</h2>

            <div class="actions">

                <input
                    type="text"
                    id="buscar"
                    placeholder="Buscar usuario..."
                >

                <button class="btn" onclick="abrirModal()">
                    + Nuevo Usuario
                </button>

            </div>

        </div>

        <table>

            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Contraseña</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaUsuarios"></tbody>

        </table>

    </div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

    <div class="modal-content">

        <h3 id="tituloModal">Nuevo Usuario</h3>

        <input type="hidden" id="index">

        <input type="text" id="usuario" placeholder="Usuario">

        <br><br>

        <div style="position:relative;">

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
        style="width:100%; padding-right:40px;"
    >

    <span
        id="togglePass"
        style="
            position:absolute;
            right:10px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            user-select:none;
            font-size:18px;
        "
    >
        👁️
    </span>

</div>

        <br><br>

        <select id="rol">
            <option value="Administrador">Administrador</option>
            <option value="Usuario">Usuario</option>
        </select>

        <br><br>

        <button class="btn" onclick="guardar()">
            Guardar
        </button>

        <button class="btn" style="background:#dc2626" onclick="cerrar()">
            Cancelar
        </button>

    </div>

</div>

<script>

    const passInput = document.getElementById("password");
const eye = document.getElementById("togglePass");

// Mostrar mientras se presiona
eye.addEventListener("mousedown", () => {
    passInput.type = "text";
});

// Ocultar al soltar
eye.addEventListener("mouseup", () => {
    passInput.type = "password";
});

// También por si el mouse sale del icono
eye.addEventListener("mouseleave", () => {
    passInput.type = "password";
});

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

const tabla = document.getElementById("tablaUsuarios");

function render(){

    tabla.innerHTML = "";

    usuarios.forEach((u,index)=>{

        let clase = u.rol === "Administrador" ? "admin" : "usuario";

        tabla.innerHTML += `
        <tr>
            <td>${u.usuario}</td>
            <td>••••••••</td>
            <td>
                <span class="role ${clase}">
                    ${u.rol}
                </span>
            </td>
            <td>
                <button class="small-btn edit" onclick="editar(${index})">Editar</button>
                <button class="small-btn delete" onclick="eliminar(${index})">Eliminar</button>
            </td>
        </tr>
        `;
    });

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

function abrirModal(){

    document.getElementById("tituloModal").textContent = "Nuevo Usuario";

    document.getElementById("index").value = "";
    document.getElementById("usuario").value = "";
    document.getElementById("password").value = "";
    document.getElementById("rol").value = "Usuario";

    document.getElementById("modal").style.display = "block";
}

function cerrar(){
    document.getElementById("modal").style.display = "none";
}

function guardar(){

    let usuario = document.getElementById("usuario").value;
    let password = document.getElementById("password").value;
    let rol = document.getElementById("rol").value;
    let index = document.getElementById("index").value;

    if(usuario === "" || password === ""){
        alert("Completa los campos");
        return;
    }

    let data = { usuario, password, rol };

    if(index === ""){
        usuarios.push(data);
    } else {
        usuarios[index] = data;
    }

    render();
    cerrar();
}

function editar(i){

    let u = usuarios[i];

    document.getElementById("tituloModal").textContent = "Editar Usuario";

    document.getElementById("index").value = i;
    document.getElementById("usuario").value = u.usuario;
    document.getElementById("password").value = u.password;
    document.getElementById("rol").value = u.rol;

    document.getElementById("modal").style.display = "block";
}

function eliminar(i){

    if(confirm("¿Eliminar usuario?")){
        usuarios.splice(i,1);
        render();
    }
}

document.getElementById("buscar").addEventListener("keyup", function(){

    let texto = this.value.toLowerCase();

    let filas = document.querySelectorAll("#tablaUsuarios tr");

    filas.forEach(fila=>{
        let usuario = fila.children[0].textContent.toLowerCase();
        fila.style.display = usuario.includes(texto) ? "" : "none";
    });

});

render();

</script>

</body>
</html>
