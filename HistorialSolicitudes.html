<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historial de Solicitudes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    position:relative;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:#1e293b;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:6px;
    cursor:pointer;
}

.back-btn:hover{
    background:#0f172a;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    color:#1e293b;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
    color:white;
    padding:10px;
    font-size:13px;
}

td{
    border:1px solid #e2e8f0;
    padding:10px;
    font-size:13px;
}

.btn{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.btn-delete{
    background:#dc2626;
}

.btn-delete:hover{
    background:#b91c1c;
}

.empty{
    text-align:center;
    padding:30px;
    color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<button class="back-btn" onclick="window.location.href='login.html'">
← Volver
</button>

<div class="title">
<h1>Historial de Solicitudes</h1>
</div>

<div id="tabla"></div>

</div>

<script>

function cargar(){

    let data = JSON.parse(localStorage.getItem("solicitudes")) || [];

    let cont = document.getElementById("tabla");

    if(data.length === 0){
        cont.innerHTML = `<div class="empty">No hay solicitudes registradas</div>`;
        return;
    }

    let html = `
    <table>
        <tr>
            <th>Responsable</th>
            <th>Entrega</th>
            <th>Área</th>
            <th>Tipo</th>
            <th>Equipos</th>
            <th>Fecha</th>
            <th>Acción</th>
        </tr>
    `;

    data.forEach((s,i)=>{

        let equipos = [];

        for(let k in s.equipos){
            if(s.equipos[k]) equipos.push(k);
        }

        html += `
        <tr>
            <td>${s.responsable}</td>
            <td>${s.entrega}</td>
            <td>${s.area}</td>
            <td>${s.tipoSolicitud}</td>
            <td>${equipos.join(", ")}</td>
            <td>${s.fecha}</td>
            <td>
                <button class="btn btn-delete" onclick="eliminar(${i})">
                    Eliminar
                </button>
            </td>
        </tr>
        `;
    });

    html += `</table>`;

    cont.innerHTML = html;
}

function eliminar(i){

    let data = JSON.parse(localStorage.getItem("solicitudes")) || [];

    data.splice(i,1);

    localStorage.setItem("solicitudes", JSON.stringify(data));

    cargar();
}

cargar();

</script>

</body>
</html>
