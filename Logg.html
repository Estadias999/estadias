<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Moderno</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e9e9ff;
    padding: 20px;
}

/* CONTENEDOR PRINCIPAL */
.container {
    width: 1000px;
    max-width: 100%;
    height: 600px;
    display: flex;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    background: white;
}

/* LADO IZQUIERDO */
.left {
    width: 50%;
    background: linear-gradient(135deg, #5b5fc7, #8b7bff);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: white;
}

/* círculos decorativos */
.left::before,
.left::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    z-index: 0;
}

.left::before {
    width: 300px;
    height: 300px;
    top: -80px;
    left: -80px;
}

.left::after {
    width: 400px;
    height: 400px;
    bottom: -150px;
    right: -150px;
}

/* logo (arriba-izquierda) */
.logo {
    position: absolute;
    top: 24px;
    left: 28px;
    font-weight: bold;
    font-size: 18px;
    z-index: 3;
}

/* imagen corporativa centrada */
.image-wrapper {
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 10px;
}

.brand-image {
    max-width: 78%;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.18));
    border-radius: 12px;
    background: transparent;
}

/* texto de bienvenida abajo-izquierda */
.welcome {
    position: absolute;
    bottom: 24px;
    left: 28px;
    z-index: 3;
}

.welcome h2 {
    font-size: 22px;
    margin-bottom: 6px;
}

.welcome p {
    font-size: 13px;
    opacity: 0.95;
    line-height: 1.1;
}

/* LADO DERECHO */
.right {
    width: 50%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h1 {
    margin-bottom: 30px;
    font-size: 26px;
}

/* INPUTS */
.form-group {
    margin-bottom: 18px;
}

label {
    font-size: 13px;
    color: #444;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border: none;
    border-radius: 25px;
    background: #f3f4f6;
    outline: none;
    padding-left: 18px;
}

input:focus {
    box-shadow: 0 0 0 2px #8b7bff;
}

/* LINKS */
.links {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin: 10px 0 20px;
    color: #666;
}

/* BOTÓN LOGIN CON BARRIDO LED */
.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #5b5fc7, #8b7bff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(91,95,199,0.25);
}

/* BARRIDO LED */
.login-btn::before {
    content: '';
    position: absolute;
    width: 60px;
    height: 200%;
    background: rgba(255, 255, 255, 0.30);
    top: -50%;
    left: -120px;
    transform: rotate(25deg);
    transition: 0.8s;
}

.login-btn:hover::before {
    left: 120%;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(91,95,199,0.35);
}

.login-btn:active {
    transform: scale(0.98);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 11px;
    color: #fff; /* blanco para verse en morado */
    text-align: center;
}

/* Responsive: apilar en pantallas pequeñas */
@media (max-width: 900px) {
    .container {
        height: auto;
        flex-direction: column;
    }
    .left, .right {
        width: 100%;
        padding: 28px;
    }
    .left {
        height: 260px;
        padding: 20px;
    }
    .brand-image {
        max-width: 60%;
    }
    .right {
        padding-top: 20px;
        padding-bottom: 40px;
    }
    .welcome { display: none; } /* opcional: ocultar texto para pantallas pequeñas */
}
</style>

</head>

<body>

<div class="container">

    <!-- IZQUIERDA -->
    <div class="left">

        <div class="logo">
        </div>

        <div class="image-wrapper">
            <!-- Guarda la imagen que me pegaste como "logo-cas.png" en la misma carpeta -->
            <img src="logo-cas.png" alt="Logo C.A.S." class="brand-image">
        </div>


    </div>

    <!-- DERECHA -->
    <div class="right">

        <h1>Login</h1>

        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="user" placeholder="Ingrese usuario">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="Ingrese contraseña">
        </div>
        
        <button class="login-btn" onclick="login()">
            LOGIN
        </button>

        <div class="footer">
            𝘚𝘪𝘴𝘵𝘦𝘮𝘢𝘴 𝘺 𝘚𝘰𝘱𝘰𝘳𝘵𝘦 𝘛é𝘤𝘯𝘪𝘤𝘰®
        </div>

    </div>

</div>

<script>

function login(){

    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "1234"){
        localStorage.setItem("rol", "admin");
        window.location.href = "./PanelAdministrador.html";
    }
    else{
        localStorage.setItem("rol", "usuario");
        window.location.href = "./PanelUsuario.html";
    }
}

function registrarUsuario(nombre, correo){

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    usuarios.push({
        nombre: nombre,
        correo: correo,
        fecha: new Date().toLocaleString()
    });

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

</script>

</body>
</html>
