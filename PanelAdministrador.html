<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Principal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f5f9;
}

/* USAMOS TU MISMO CONTAINER */
.container{
    width:450px;
    background:#ffffff;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    font-size:24px;
    color:#1e293b;
    margin-bottom:8px;
}

p{
    font-size:14px;
    color:#64748b;
    margin-bottom:25px;
}

/* BOTONES COMO TU ESTILO */
button{
    width:100%;
    padding:14px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    margin-top:12px;
    transition:0.2s;
}

button:hover{
    background:#0f172a;
}

/* BOTÓN SECUNDARIO */
.secondary{
    background:#64748b;
}

.secondary:hover{
    background:#475569;
}

</style>

</head>

<body>

<div class="container">

    <h1>Bienvenido de nuevo</h1>
    <p>Bienvenido a tu panel. ¿Qué deseas realizar?</p>

    <button onclick="irSolicitudes()">
        Solicitudes
    </button>

    <button onclick="irCrear()">
        Solicitud
    </button>

    <button onclick="irSolicitudes()">
        Inventario
    </button>

     <button onclick="irSolicitudes()">
        Areas
    </button>

     <button onclick="irSolicitudes()">
        Administracion de Usuarios
    </button>

</div>

<script>

function irSolicitudes(){
    window.location.href = "solicitudes.html";
}

function irCrear(){
    window.location.href = "formulario.html";
}

function irInventario(){
    window.location.href = "inventario.html";
}

</script>

</body>
</html>
