<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Formulario - Solicitud de Equipos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e9ff;
    padding:30px;
}

/* CONTENEDOR */
.container{
    width:1000px;
    max-width:100%;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
    position:relative;
}

/* BOTÓN VOLVER */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    border:none;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    padding:12px 18px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

/* TÍTULO */
.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:30px;
    color:#5b5fc7;
}

/* SECCIONES */
.section{
    background:#fafaff;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    border:1px solid #ececff;
}

.section-title{
    font-size:18px;
    font-weight:bold;
    color:#5b5fc7;
    margin-bottom:15px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:13px;
    color:#444;
    margin-bottom:6px;
}

input, select{
    padding:14px;
    border:none;
    border-radius:25px;
    background:#f3f4f6;
    outline:none;
}

input:focus,
select:focus{
    box-shadow:0 0 0 2px #8b7bff;
}

/* SWITCH-ITEM ahora con contador */
.switch-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #ececff;
}

/* Contador */
.counter{
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.counter button{
    width:34px;
    height:34px;
    border-radius:8px;
    border:none;
    background:#5b5fc7;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:transform .12s;
}

.counter button:active{ transform:scale(.96); }

.counter .value{
    min-width:30px;
    text-align:center;
    font-weight:bold;
    background:#f3f4f6;
    padding:6px 10px;
    border-radius:8px;
}

/* BOTÓN */
.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 20px rgba(91,95,199,0.25);
    position:relative;
    overflow:hidden;
}

/* efecto LED */
.btn::before{
    content:'';
    position:absolute;
    width:60px;
    height:200%;
    background:rgba(255,255,255,.3);
    top:-50%;
    left:-120px;
    transform:rotate(25deg);
    transition:.8s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(91,95,199,0.35);
}

.btn:active{
    transform:scale(.98);
}

</style>

</head>

<script>
/* Áreas guardadas en localStorage */
let areas = JSON.parse(localStorage.getItem("areas")) || [];

function renderAreas(){
    let select = document.getElementById("areaSelect");
    select.innerHTML = '<option value="">Seleccionar área</option>';

    areas.forEach((area, index) => {
        select.innerHTML += `
            <option value="${index}">
                ${area}
            </option>
        `;
    });

    localStorage.setItem("areas", JSON.stringify(areas));
}

function agregarArea(){
    let input = document.getElementById("nuevaArea");
    let valor = input.value.trim();

    if(valor === ""){
        alert("Escribe un área");
        return;
    }

    areas.push(valor);
    input.value = "";
    renderAreas();
}

function eliminarArea(){
    let select = document.getElementById("areaSelect");
    let index = select.value;

    if(index === ""){
        alert("Selecciona un área");
        return;
    }

    areas.splice(index, 1);
    renderAreas();
}

/* Contadores: configuración de botones + y - */
function setupCounters(){
    document.querySelectorAll('.counter').forEach(counter => {
        const dec = counter.querySelector('.dec');
        const inc = counter.querySelector('.inc');
        const valueEl = counter.querySelector('.value');

        // Asegurar valor numérico inicial
        if (!valueEl.textContent || isNaN(Number(valueEl.textContent))) valueEl.textContent = '0';

        inc.addEventListener('click', () => {
            let v = Number(valueEl.textContent) + 1;
            // límite opcional
            v = Math.min(999, v);
            valueEl.textContent = v;
        });

        dec.addEventListener('click', () => {
            let v = Number(valueEl.textContent) - 1;
            if (isNaN(v) || v < 0) v = 0;
            valueEl.textContent = v;
        });
    });
}

/* Generar solicitud: leer contadores numéricos */
function generarSolicitud(){
    const solicitud = {
        responsable: document.getElementById("responsable").value,
        entrega: document.getElementById("entrega").value,
        area: (document.getElementById("areaSelect").value === "" ? "" : document.getElementById("areaSelect").selectedOptions[0].text),
        tipoSolicitud: document.getElementById("tipoSolicitud").value,
        equipos: {
            laptop: Number(document.getElementById("laptopCount").textContent),
            monitor: Number(document.getElementById("monitorCount").textContent),
            cargadorLaptop: Number(document.getElementById("cargadorLaptopCount").textContent),
            teclado: Number(document.getElementById("tecladoCount").textContent),
            celular: Number(document.getElementById("celularCount").textContent),
            gabinete: Number(document.getElementById("gabineteCount").textContent),
            cargadorCelular: Number(document.getElementById("cargadorCelularCount").textContent),
            audifonos: Number(document.getElementById("audifonosCount").textContent),
            mouse: Number(document.getElementById("mouseCount").textContent),
            usb: Number(document.getElementById("usbCount").textContent)
        },
        otrosEquipos: document.getElementById("otrosEquipos").value,
        fecha: new Date().toLocaleDateString('es-MX')
    };

    let solicitudes = JSON.parse(localStorage.getItem("solicitudes")) || [];
    solicitudes.push(solicitud);
    localStorage.setItem("solicitudes", JSON.stringify(solicitudes));

    generarPDF(solicitud);

    alert("Solicitud guardada e impresa correctamente");

    // Limpieza: inputs de texto y contadores
    document.querySelectorAll("input[type='text']").forEach(input => input.value = "");
    document.querySelectorAll(".counter .value").forEach(v => v.textContent = "0");
    document.getElementById("tipoSolicitud").selectedIndex = 0;
    document.getElementById("areaSelect").selectedIndex = 0;
    document.getElementById("otrosEquipos").value = "";
}

function volverAlPanel(){
    let rol = localStorage.getItem("rol");
    if(rol === "admin"){
        window.location.href = "./PanelAdministrador.html";
    } else {
