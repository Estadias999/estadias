<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Equipos de Cómputo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e9ff;
    padding:30px;
}

.container{
    width:1000px;
    max-width:100%;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
    position:relative;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    border:none;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    padding:12px 18px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:30px;
    color:#5b5fc7;
}

.section{
    background:#fafaff;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    border:1px solid #ececff;
}

.section-title{
    font-size:18px;
    font-weight:bold;
    color:#5b5fc7;
    margin-bottom:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:13px;
    color:#444;
    margin-bottom:6px;
}

input, select{
    padding:14px;
    border:none;
    border-radius:25px;
    background:#f3f4f6;
    outline:none;
}

input:focus,
select:focus{
    box-shadow:0 0 0 2px #8b7bff;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.area-buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.area-buttons button{
    flex:1;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="container">

    <button class="back-btn" onclick="history.back()">← Volver</button>

    <div class="title">
        <h1>Solicitud de Equipos de Cómputo</h1>
    </div>

    <!-- DATOS GENERALES -->
    <div class="section">

        <div class="section-title">
            Datos Generales
        </div>

        <div class="form-grid">

            <div class="form-group">
                <label>Responsable</label>
                <input type="text" id="responsable">
            </div>

            <div class="form-group">
                <label>Nombre de quien entrega equipos</label>
                <input type="text" id="entrega">
            </div>

            <div class="form-group">
                <label>Seleccionar Área</label>
                <select id="area">
                    <option value="">Seleccione...</option>
                    <option>Sistemas</option>
                    <option>Recursos Humanos</option>
                    <option>Finanzas</option>
                    <option>Operaciones</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nueva Área</label>
                <input type="text" id="nuevaArea">
            </div>

        </div>

        <div class="area-buttons">
            <button class="btn" onclick="agregarArea()">Agregar</button>
            <button class="btn" onclick="eliminarArea()">Eliminar</button>
        </div>

    </div>

    <!-- TIPO DE SOLICITUD -->
    <div class="section">

        <div class="section-title">
            Tipo de Solicitud
        </div>

        <select id="tipoSolicitud">
            <option value="Asignación">Asignación</option>
            <option value="Préstamo Temporal">Préstamo Temporal</option>
        </select>

    </div>

    <!-- EQUIPOS -->
    <div class="section">

        <div class="section-title">
            Equipos
        </div>

        <div class="form-grid">

            <div class="form-group">
                <label>Laptop</label>
                <input type="number" min="0" value="0" id="laptop">
            </div>

            <div class="form-group">
                <label>Monitor</label>
                <input type="number" min="0" value="0" id="monitor">
            </div>

            <div class="form-group">
                <label>Cargador Laptop</label>
                <input type="number" min="0" value="0" id="cargadorLaptop">
            </div>

            <div class="form-group">
                <label>Teclado</label>
                <input type="number" min="0" value="0" id="teclado">
            </div>

            <div class="form-group">
                <label>Celular</label>
                <input type="number" min="0" value="0" id="celular">
            </div>

            <div class="form-group">
                <label>Gabinete</label>
                <input type="number" min="0" value="0" id="gabinete">
            </div>

            <div class="form-group">
                <label>Cargador Celular</label>
                <input type="number" min="0" value="0" id="cargadorCelular">
            </div>

            <div class="form-group">
                <label>Audífonos</label>
                <input type="number" min="0" value="0" id="audifonos">
            </div>

            <div class="form-group">
                <label>Mouse</label>
                <input type="number" min="0" value="0" id="mouse">
            </div>

            <div class="form-group">
                <label>USB</label>
                <input type="number" min="0" value="0" id="usb">
            </div>

        </div>

    </div>

    <button class="btn" onclick="generarSolicitud()">
        Generar Solicitud
    </button>

</div>

<script>

function agregarArea(){

    let nuevaArea = document.getElementById("nuevaArea");
    let select = document.getElementById("area");

    if(nuevaArea.value.trim() === ""){
        alert("Ingrese un área");
        return;
    }

    let option = document.createElement("option");

    option.value = nuevaArea.value;
    option.text = nuevaArea.value;

    select.add(option);

    select.value = nuevaArea.value;

    nuevaArea.value = "";
}

function eliminarArea(){

    let select = document.getElementById("area");

    if(select.selectedIndex <= 0){
        alert("Seleccione un área");
        return;
    }

    select.remove(select.selectedIndex);
}

function generarSolicitud(){

    const solicitud = {

        responsable: document.getElementById("responsable").value,
        entrega: document.getElementById("entrega").value,
        area: document.getElementById("area").value,
        tipoSolicitud: document.getElementById("tipoSolicitud").value,
        fecha: new Date().toLocaleDateString(),

        equipos:{
            laptop: document.getElementById("laptop").value,
            monitor: document.getElementById("monitor").value,
            cargadorLaptop: document.getElementById("cargadorLaptop").value,
            teclado: document.getElementById("teclado").value,
            celular: document.getElementById("celular").value,
            gabinete: document.getElementById("gabinete").value,
            cargadorCelular: document.getElementById("cargadorCelular").value,
            audifonos: document.getElementById("audifonos").value,
            mouse: document.getElementById("mouse").value,
            usb: document.getElementById("usb").value
        }

    };

    generarPDF(solicitud);
}

function generarPDF(solicitud){

const contenido = document.createElement("div");

const esAsignacion =
solicitud.tipoSolicitud === "Asignación"
? "[X] Asignación"
: "[ ] Asignación";

const esPrestamo =
solicitud.tipoSolicitud === "Préstamo Temporal"
? "[X] Préstamo Temporal"
: "[ ] Préstamo Temporal";

contenido.innerHTML = `

<div style="font-family:Arial;padding:20px;">

<h2 style="text-align:center;margin-bottom:20px;">
Formato de Solicitud de Equipo de Cómputo
</h2>

<table style="width:100%;border-collapse:collapse;margin-bottom:15px;">
<tr>
<th colspan="3" style="border:1px solid black;padding:8px;">
Datos del Responsable
</th>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">
Área: ${solicitud.area}
</td>

<td style="border:1px solid black;padding:8px;">
Fecha: ${solicitud.fecha}
</td>

<td style="border:1px solid black;padding:8px;">
${esAsignacion}<br>
${esPrestamo}
</td>
</tr>

<tr>
<td colspan="3" style="border:1px solid black;padding:8px;">
Responsable: ${solicitud.responsable}
</td>
</tr>

<tr>
<td colspan="3" style="border:1px solid black;padding:8px;">
Entrega: ${solicitud.entrega}
</td>
</tr>

</table>

<table style="width:100%;border-collapse:collapse;">

<tr>
<th style="border:1px solid black;padding:8px;">Equipo</th>
<th style="border:1px solid black;padding:8px;">Cantidad</th>
<th style="border:1px solid black;padding:8px;">Equipo</th>
<th style="border:1px solid black;padding:8px;">Cantidad</th>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">Laptop</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.laptop}</td>

<td style="border:1px solid black;padding:8px;">Monitor</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.monitor}</td>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">Cargador Laptop</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.cargadorLaptop}</td>

<td style="border:1px solid black;padding:8px;">Teclado</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.teclado}</td>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">Celular</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.celular}</td>

<td style="border:1px solid black;padding:8px;">Gabinete</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.gabinete}</td>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">Cargador Celular</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.cargadorCelular}</td>

<td style="border:1px solid black;padding:8px;">Audífonos</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.audifonos}</td>
</tr>

<tr>
<td style="border:1px solid black;padding:8px;">Mouse</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.mouse}</td>

<td style="border:1px solid black;padding:8px;">USB</td>
<td style="border:1px solid black;padding:8px;">${solicitud.equipos.usb}</td>
</tr>

</table>

<div style="display:flex;justify-content:space-between;margin-top:80px;">

<div style="text-align:center;width:40%;">
_________________________________<br>
Firma Responsable<br>
<b>${solicitud.responsable}</b>
</div>

<div style="text-align:center;width:40%;">
_________________________________<br>
Firma Entrega<br>
<b>${solicitud.entrega}</b>
</div>

</div>

</div>
`;

html2pdf()
.set({
margin:10,
filename:'Solicitud_Equipos.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
}
})
.from(contenido)
.save();

setTimeout(()=>{

const ventana = window.open("","_blank");

ventana.document.write(`
<html>
<head>
<title>Imprimir Solicitud</title>
</head>
<body>
${contenido.innerHTML}
</body>
</html>
`);

ventana.document.close();

setTimeout(()=>{
ventana.print();
},500);

},1000);

}

</script>

</body>
</html>
