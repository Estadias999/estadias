<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario - Solicitud de Equipos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e9ff;
    padding:30px;
}

/* CONTENEDOR */
.container{
    width:1000px;
    max-width:100%;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
    position:relative;
}

/* BOTÓN VOLVER */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    border:none;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    padding:12px 18px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

/* TÍTULO */
.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:30px;
    color:#5b5fc7;
}

/* SECCIONES */
.section{
    background:#fafaff;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    border:1px solid #ececff;
}

.section-title{
    font-size:18px;
    font-weight:bold;
    color:#5b5fc7;
    margin-bottom:15px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:13px;
    color:#444;
    margin-bottom:6px;
}

input, select{
    padding:14px;
    border:none;
    border-radius:25px;
    background:#f3f4f6;
    outline:none;
}

input:focus,
select:focus{
    box-shadow:0 0 0 2px #8b7bff;
}

/* SWITCHES */
.switch-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #ececff;
}

.switch{
    position:relative;      
    width:52px;
    height:28px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#ccc;
    transition:.3s;
    border-radius:34px;
}

.slider:before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#8b7bff;
}

.switch input:checked + .slider:before{
    transform:translateX(24px);
}

/* BOTÓN */
.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#5b5fc7,#8b7bff);
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 20px rgba(91,95,199,0.25);
    position:relative;
    overflow:hidden;
}

/* efecto LED */
.btn::before{
    content:'';
    position:absolute;
    width:60px;
    height:200%;
    background:rgba(255,255,255,.3);
    top:-50%;
    left:-120px;
    transform:rotate(25deg);
    transition:.8s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(91,95,199,0.35);
}

.btn:active{
    transform:scale(.98);
}

</style>

</head>

<body>

<div class="container">

                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Cargador Laptop</span>
            <label class="switch">
                <input type="checkbox" id="cargadorLaptop">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Teclado</span>
            <label class="switch">
                <input type="checkbox" id="teclado">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Celular</span>
            <label class="switch">
                <input type="checkbox" id="celular">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Gabinete</span>
            <label class="switch">
                <input type="checkbox" id="gabinete">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Cargador Celular</span>
            <label class="switch">
                <input type="checkbox" id="cargadorCelular">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Audífonos</span>
            <label class="switch">
                <input type="checkbox" id="audifonos">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Mouse</span>
            <label class="switch">
                <input type="checkbox" id="mouse">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>USB</span>
            <label class="switch">
                <input type="checkbox" id="usb">
                <span class="slider"></span>
            </label>
        </div>

        <label style="margin-top:20px;">Otros equipos</label>

        <input type="text" id="otrosEquipos" placeholder="Especificar...">

    </div>

    <button class="btn" onclick="generarSolicitud()">
        Generar Solicitud
    </button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
let areas = JSON.parse(localStorage.getItem("areas")) || [];

function renderAreas(){
    let select = document.getElementById("areaSelect");
    select.innerHTML = '<option value="">Seleccionar área</option>';

    areas.forEach((area, index) => {
        select.innerHTML += `
            <option value="${index}">
                ${area}
            </option>
        `;
    });

    localStorage.setItem("areas", JSON.stringify(areas));
}

function agregarArea(){
    let input = document.getElementById("nuevaArea");
    let valor = input.value.trim();

    if(valor === ""){
        alert("Escribe un área");
        return;
    }

    areas.push(valor);
    input.value = "";
    renderAreas();
}

function eliminarArea(){
    let select = document.getElementById("areaSelect");
    let index = select.value;

    if(index === ""){
        alert("Selecciona un área");
        return;
    }

    areas.splice(index, 1);
    renderAreas();
}

function generarPDF(solicitud){

                <table style="width:100%; border-collapse:collapse; margin-bottom:10px;">
                    <tr>
                        <th colspan="3" style="border:1px solid #000; padding:6px; font-size:12px; text-align:center; font-weight:bold;">Datos del responsable</th>
                    </tr>
                    <tr>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Tipo de responsiva:</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Área: ${solicitud.area}</td>

                        <th style="border:1px solid #000; padding:6px; font-size:12px;">Equipos</th>

                    </tr>
                    <tr>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Laptop</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px; text-align:center;">${solicitud.equipos.laptop ? '1' : ''}</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Monitor</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px; text-align:center;">${solicitud.equipos.monitor ? '1' : ''}</td>
                    </tr>
                    <tr>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Cargador de laptop</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px; text-align:center;">${solicitud.equipos.cargadorLaptop ? '1' : ''}</td>
                        <td style="border:1px solid #000; padding:6px; font-size:12px;">Teclado</td>

                    <tr><td style="border:1px solid #000; padding:12px;"></td><td style="border:1px solid #000; padding:12px;"></td><td style="border:1px solid #000; padding:12px;"></td></tr>
                    <tr><td style="border:1px solid #000; padding:12px;"></td><td style="border:1px solid #000; padding:12px;"></td><td style="border:1px solid #000; padding:12px;"></td></tr>
                </table>
                
                <table style="width:100%; border-collapse:collapse; margin-bottom:10px;">
                    <tr>
                        <th colspan="3" style="border:1px solid #000; padding:6px; font-size:12px; text-align:center; font-weight:bold;">Datos de Usuarios</th>
                    </tr>
                    <tr>
                        <th style="border:1px solid #000; padding:6px; font-size:12px;">Usuario Asignación</th>
                        <th style="border:1px solid #000; padding:6px; font-size:12px;">Línea Telefónica</th>

                    <tr>
                        <th style="border:1px solid #000; padding:6px; font-size:12px;">Dirección física</th>

                </table>

                <div style="display:flex; justify-content:space-between; margin-top:50px; font-size:12px;">
                    <div style="text-align:center; width:40%;">
                        __________________________________<br>
                        Firma del Responsable<br>

                    </div>
                    <div style="text-align:center; width:40%;">

    // Configuración de html2pdf para que se ajuste perfectamente a una hoja A4

        .set({
            margin: 10,
            filename: `Solicitud_${Date.now()}.pdf`,

        })
        .from(contenido)
        .save()
        .then(() => {
            // Abre la ventana de impresión nativa con el nuevo diseño limpio
            const ventana = window.open("", "_blank");
            ventana.document.write(`
                <html>
                <head>
                    <title>Imprimir Formato de Solicitud</title>

                        body { margin: 0; padding: 0; }

                    </style>

                <body>

            ventana.document.close();
            setTimeout(() => {
                ventana.print();
            }, 500);

}

function generarSolicitud(){
    // Extraemos los datos desde tu formulario rápido
    const solicitud = {
        responsable: document.getElementById("responsable").value,
        entrega: document.getElementById("entrega").value,
        area: document.getElementById("areaSelect").selectedOptions[0].text,
        tipoSolicitud: document.getElementById("tipoSolicitud").value,
        equipos: {
            laptop: document.getElementById("laptop").checked,
            monitor: document.getElementById("monitor").checked,
            cargadorLaptop: document.getElementById("cargadorLaptop").checked,
            teclado: document.getElementById("teclado").checked,
            celular: document.getElementById("celular").checked,
            gabinete: document.getElementById("gabinete").checked,
            cargadorCelular: document.getElementById("cargadorCelular").checked,
            audifonos: document.getElementById("audifonos").checked,
            mouse: document.getElementById("mouse").checked,
            usb: document.getElementById("usb").checked
        },
        otrosEquipos: document.getElementById("otrosEquipos").value,
        fecha: new Date().toLocaleDateString('es-MX') // Formato de fecha local más limpio
    };

    let solicitudes = JSON.parse(localStorage.getItem("solicitudes")) || [];
    solicitudes.push(solicitud);
    localStorage.setItem("solicitudes", JSON.stringify(solicitudes));

    // Ejecuta la generación con el nuevo diseño
    generarPDF(solicitud);

    alert("Solicitud guardada e impresa correctamente");

    // Limpieza de campos del formulario rápido
    document.querySelectorAll("input[type='text']").forEach(input => input.value = "");
    document.querySelectorAll("input[type='checkbox']").forEach(check => check.checked = false);
}

function volverAlPanel(){

    let rol = localStorage.getItem("rol");

    if(rol === "admin"){
        window.location.href = "./PanelAdministrador.html";
    } else {
        window.location.href = "./PanelUsuario.html";
    }
}

renderAreas();
</script>
</script>
</body>
</html>
