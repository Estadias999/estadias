<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario - Solicitud de Equipos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

/* CONTENEDOR */
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    position:relative;
}

/* BOTÓN VOLVER */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:#1e293b;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.back-btn:hover{
    background:#0f172a;
}

/* TÍTULO */
.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:30px;
    color:#1e293b;
}

/* SECCIONES */
.section{
    margin-bottom:30px;
}

.section-title{
    background:#1e293b;
    color:white;
    padding:12px;
    border-radius:6px;
    margin-bottom:15px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:14px;
    font-weight:bold;
    margin-bottom:8px;
    color:#334155;
}

input, select{
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:6px;
}

/* SWITCHES */
.switch-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8fafc;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.switch{
    position:relative;
    width:45px;
    height:24px;
}

.switch input{
    opacity:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#cbd5e1;
    border-radius:30px;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    height:18px;
    width:18px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#1e293b;
}

.switch input:checked + .slider:before{
    transform:translateX(20px);
}

/* OTROS */
#otrosContainer{
    display:none;
    margin-top:10px;
}

#otrosContainer input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:6px;
}

/* BOTONES */
.btn{
    width:100%;
    padding:14px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    margin-top:20px;
}

.btn:hover{
    background:#0f172a;
}

</style>

</head>

<body>

<div class="container">

    <!-- BOTÓN VOLVER -->
    <button class="back-btn" onclick="volverLogin()">
        ← Volver
    </button>

    <!-- TÍTULO -->
    <div class="title">
        <h1>Solicitud de Equipos de Cómputo</h1>
    </div>

    <!-- DATOS -->
    <div class="section">

        <div class="section-title">Datos Generales</div>

        <div class="form-grid">

         <div class="form-group">
                <label>Responsable</label>
                <input type="text">
         </div>

        <div class="form-group">
            <label>Nombre de quien entrega equipos</label>                <input type="text">
            </div>
           <div class="form-group">
         <label>Área</label>
          <select id="areaSelect">
              <option value="">Seleccionar área</option>
            </select>
            <input type="text" id="nuevaArea" placeholder="Nueva área"
           style="margin-top:10px;padding:10px;border:1px solid #cbd5e1;border-radius:6px;">

         <div style="margin-top:10px; display:flex; gap:10px;">

          <button type="button" onclick="agregarArea()"
         style="padding:8px 12px    ;background:#1e293b;color:white;border:none;border-radius:6px;">
              Agregar
  </button>

        <button type="button" onclick="eliminarArea()"
            style="padding:8px 12px;background:#dc2626;color:white;border:none;border-radius:6px;">
            Eliminar
        </button>

        

    </div>
</div>
            <div class="form-group">
                <label>Tipo de Solicitud</label>
                <select>
                    <option>Asignación</option>
                    <option>Préstamo Temporal</option>
                    <option>Retiro de Equipo</option>
                </select>
            </div>

        </div>

    </div>

    <!-- EQUIPOS -->
    <div class="section">

        <div class="section-title">Equipos</div>

        <div class="switch-item">
            <span>Laptop</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Monitor</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-item">
            <span>Teclado</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

    </div>

    <!-- OTROS -->
    <div class="section">

        <div class="section-title">Otros</div>

        <div class="switch-item">
            <span>Otros equipos</span>
            <label class="switch">
                <input type="checkbox" id="otrosSwitch" onclick="toggleOtros()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="otrosContainer">
            <input type="text" placeholder="Especificar equipo...">
        </div>

    </div>

    <!-- BOTÓN -->
    <button class="btn" onclick="generarSolicitud()">
        Generar Solicitud
    </button>

</div>

<script>

let areas = JSON.parse(localStorage.getItem("areas")) || [];

function renderAreas(){

    let select = document.getElementById("areaSelect");

    select.innerHTML = '<option value="">Seleccionar área</option>';

    areas.forEach((area, index) => {
        select.innerHTML += `<option value="${index}">${area}</option>`;
    });

    localStorage.setItem("areas", JSON.stringify(areas));
}

function agregarArea(){

    let input = document.getElementById("nuevaArea");
    let valor = input.value.trim();

    if(valor === ""){
        alert("Escribe un nombre de área");
        return;
    }

    areas.push(valor);
    input.value = "";
    renderAreas();
}

function eliminarArea(){

    let select = document.getElementById("areaSelect");
    let index = select.value;

    if(index === ""){
        alert("Selecciona un área para eliminar");
        return;
    }

    areas.splice(index, 1);
    renderAreas();
}

renderAreas();

function volverLogin(){
    window.location.href = "./login.html";
}

// MOSTRAR OTROS
function toggleOtros(){

    let check = document.getElementById("otrosSwitch");
    let contenedor = document.getElementById("otrosContainer");

    contenedor.style.display = check.checked ? "block" : "none";
}

// GENERAR SOLICITUD
function generarSolicitud(){
    alert("Solicitud generada correctamente");
}

</script>

</body>
</html>
